name: Dialyzer

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: dialyzer-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      elixir: ${{ steps.filter.outputs.elixir }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            elixir:
              - 'lib/**'
              - 'test/**'
              - 'mix.exs'
              - 'mix.lock'
              - '.dialyzer_ignore.exs'
              - 'devenv.nix'
              - 'devenv.lock'
              - 'devenv.yaml'
              - '.github/actions/setup-elixir/**'

  dialyzer:
    name: Dialyzer (zero warnings)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.elixir == 'true'

    env:
      MIX_ENV: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Elixir with shared cache
        uses: ./.github/actions/setup-elixir
        with:
          mix-env: dev
          cache-plt: "true"

      - name: Compile
        run: mix compile

      - name: Dialyzer
        run: mix dialyzer
