name: Test

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      MIX_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Elixir with shared cache
        uses: ./.github/actions/setup-elixir
        with:
          mix-env: test

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test
