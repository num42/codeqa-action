name: Code Quality Comparison

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  compare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache Mix deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-1.19-27.3-${{ hashFiles('mix.lock', 'mix.exs') }}
          restore-keys: ${{ runner.os }}-mix-1.19-27.3-

      - name: Get fork point
        id: fork-point
        run: |
          echo "sha=$(git merge-base HEAD ${{ github.event.pull_request.base.sha }})" >> "$GITHUB_OUTPUT"

      - uses: ./
        with:
          command: compare
          base-ref: ${{ steps.fork-point.outputs.sha }}
          comment: true
          build: source
