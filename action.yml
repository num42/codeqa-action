name: "CodeQA"
description: "Run code quality analysis with codeqa CLI — health reports, comparisons, and raw metrics"
author: "num42"

branding:
  icon: "bar-chart-2"
  color: "blue"

inputs:
  command:
    description: "Command to run: health-report, compare, analyze, or line-report"
    required: true
  path:
    description: "Directory to analyze"
    required: false
    default: "."
  comment:
    description: "Post result as sticky PR comment"
    required: false
    default: "false"
  fail-grade:
    description: "Minimum acceptable grade for health-report (e.g. C). Fails if below"
    required: false
    default: ""
  base-ref:
    description: "Base git ref for compare (defaults to PR base SHA)"
    required: false
    default: ""
  detail:
    description: "Detail level for health-report: summary, default, or full"
    required: false
    default: "default"
  top:
    description: "Number of worst offenders per category"
    required: false
    default: "5"
  format:
    description: "Output format for compare: json or markdown"
    required: false
    default: "markdown"
  config:
    description: "Path to .codeqa.yml config file"
    required: false
    default: ""
  ignore-paths:
    description: "YAML list of path patterns to ignore (supports wildcards, e.g. 'test/*')"
    required: false
    default: ""
  ref:
    description: "Git ref/SHA to tag the report with (line-report only)"
    required: false
    default: ""
  publish:
    description: "Branch to deploy HTML reports to (e.g. 'gh-pages'). Enables GitHub Pages publishing."
    required: false
    default: ""
  pages-path:
    description: "Path prefix within the deploy branch for reports (default: codeqa)"
    required: false
    default: "codeqa"
  max-reports:
    description: "Maximum number of reports to keep (prunes oldest). Default: unlimited."
    required: false
    default: ""
  output-dir:
    description: "Output directory for HTML line reports (default: line_report_html)"
    required: false
    default: "line_report_html"
  extra-args:
    description: "Additional CLI flags passed through to codeqa"
    required: false
    default: ""
  version:
    description: "Version of codeqa to download (defaults to latest)"
    required: false
    default: "latest"

outputs:
  report-file:
    description: "Path to the output file"
    value: ${{ steps.run.outputs.report-file }}
  grade:
    description: "Overall grade (health-report only)"
    value: ${{ steps.run.outputs.grade }}
  report-dir:
    description: "Directory containing the generated HTML report (line-report only)"
    value: ${{ steps.run.outputs.report-dir }}

runs:
  using: "composite"
  steps:
    - name: Set up Erlang
      uses: erlef/setup-beam@v1
      with:
        otp-version: "27.3"
        elixir-version: "1.19"

    - name: Run codeqa
      id: run
      shell: bash
      env:
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_PATH: ${{ inputs.path }}
        INPUT_DETAIL: ${{ inputs.detail }}
        INPUT_TOP: ${{ inputs.top }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_IGNORE_PATHS: ${{ inputs.ignore-paths }}
        INPUT_EXTRA_ARGS: ${{ inputs.extra-args }}
        INPUT_BASE_REF: ${{ inputs.base-ref }}
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_REF: ${{ inputs.ref }}
        INPUT_PUBLISH: ${{ inputs.publish }}
        INPUT_PAGES_PATH: ${{ inputs.pages-path }}
        INPUT_MAX_REPORTS: ${{ inputs.max-reports }}
        INPUT_OUTPUT_DIR: ${{ inputs.output-dir }}
      run: ${{ github.action_path }}/scripts/run.sh

    - name: Deploy to GitHub Pages
      if: inputs.publish != ''
      shell: bash
      env:
        PUBLISH_BRANCH: ${{ inputs.publish }}
        PAGES_PATH: ${{ inputs.pages-path }}
        DEPLOY_DIR: ${{ steps.run.outputs.report-dir }}
        GITHUB_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        INPUT_REF: ${{ inputs.ref }}
      run: ${{ github.action_path }}/scripts/deploy-pages.sh

    - name: Post PR comment
      if: inputs.comment == 'true' && github.event_name == 'pull_request'
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        header: codeqa-${{ inputs.command }}
        path: ${{ steps.run.outputs.report-file }}

    - name: Check grade threshold
      if: inputs.fail-grade != '' && inputs.command == 'health-report'
      shell: bash
      env:
        ACTUAL_GRADE: ${{ steps.run.outputs.grade }}
        MIN_GRADE: ${{ inputs.fail-grade }}
      run: |
        # Grade ordering from best to worst
        GRADES=("A" "A-" "B+" "B" "B-" "C+" "C" "C-" "D+" "D" "D-" "F")

        grade_index() {
          local g="$1"
          for i in "${!GRADES[@]}"; do
            if [[ "${GRADES[$i]}" == "$g" ]]; then
              echo "$i"
              return
            fi
          done
          echo "999"
        }

        actual_idx=$(grade_index "$ACTUAL_GRADE")
        min_idx=$(grade_index "$MIN_GRADE")

        if [[ "$actual_idx" -gt "$min_idx" ]]; then
          echo "::error::Code health grade $ACTUAL_GRADE is below minimum $MIN_GRADE"
          exit 1
        else
          echo "Grade $ACTUAL_GRADE meets minimum threshold $MIN_GRADE"
        fi
